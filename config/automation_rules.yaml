rules:
  - id: mailer_daemon_undelivered
    enabled: true
    priority: 10
    match:
      from_address_regex: "(?i)^mailer-daemon@"
    actions:
      move_to_folder: Undelivered
      skip_llm: true
      mark_analyzed: true
      set_category: undelivered

  - id: swift_tt_payment_scam
    enabled: true
    priority: 12
    match:
      subject_regex: "(?i)(SWIFT\\s+Ref|TT\\s*/[\\d-]+|wire\\s+transfer\\s+(ref|confirmation))"
    actions:
      move_to_folder: Junk
      skip_llm: true
      mark_analyzed: true
      set_category: spam

  - id: swift_tt_payment_scam_body
    enabled: true
    priority: 13
    match:
      header_contains: "TT payment remitted"
    actions:
      move_to_folder: Junk
      skip_llm: true
      mark_analyzed: true
      set_category: spam

  - id: toner_cartridge_cold_spam
    enabled: true
    priority: 14
    match:
      header_contains: "toner cartridge"
    actions:
      move_to_folder: Junk
      skip_llm: true
      mark_analyzed: true
      set_category: spam

  - id: toner_cartridge_cold_spam_alt
    enabled: true
    priority: 15
    match:
      subject_regex: "(?i)(toner|ink\\s*cartridge|printer\\s*cartridge)"
    actions:
      move_to_folder: Junk
      skip_llm: true
      mark_analyzed: true
      set_category: spam

  - id: gk_hair_noreply_ignore
    enabled: true
    priority: 20
    match:
      from_address: "no-reply@gkhair.com"
    actions:
      no_action: true
      skip_llm: true
      mark_analyzed: true
      set_category: ignored_noreply

  - id: facebook_notifications_platform
    enabled: true
    priority: 21
    match:
      from_address: "notification@facebookmail.com"
    actions:
      move_to_folder: Platform Notifications
      skip_llm: true
      mark_analyzed: true
      set_category: platform_notification

  - id: shopify_audiences_platform_notifications
    enabled: true
    priority: 30
    match:
      from_address: "no-reply-audiences@shopify.com"
    actions:
      move_to_folder: Platform Notifications
      skip_llm: true
      mark_analyzed: true
      set_category: platform_notification

  - id: postscriptapp_customer_support
    enabled: true
    priority: 31
    match:
      from_address_regex: "(?i)(postscriptapp\\.com|conversations\\+.+@postscript\\.io$)"
    actions:
      move_to_folder: Customer Support
      skip_llm: true
      mark_analyzed: true
      set_category: customer_support

  - id: klaviyo_customer_support
    enabled: true
    priority: 32
    match:
      from_address_regex: "(?i)@([^@]*\\.)?klaviyo\\.com$"
    actions:
      move_to_folder: Customer Support
      skip_llm: true
      mark_analyzed: true
      set_category: customer_support

  - id: didww_sms_forwarding_platform
    enabled: true
    priority: 33
    match:
      from_address: "sms-forwarding@didww.com"
    actions:
      move_to_folder: Platform Notifications
      skip_llm: true
      mark_analyzed: true
      set_category: platform_notification
