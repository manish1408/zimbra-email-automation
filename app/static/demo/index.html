<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zimbra Email Agent Demo</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a22;
      --border: #2a2f3a;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #5b8def;
      --accent-dim: #2a3f66;
      --success: #3dd68c;
      --warn: #f5a524;
      --danger: #f87171;
      --node: #1e2430;
      --node-active: #2d4a7a;
      --node-done: #1f3d32;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .status-pill {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--node);
    }
    .status-pill.ok { border-color: #2f6f52; color: var(--success); }
    .status-pill.bad { border-color: #7f3b3b; color: var(--danger); }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      min-height: calc(100vh - 72px);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
    }
    .panel-body {
      padding: 16px;
      overflow: auto;
      flex: 1;
    }
    #graph-canvas {
      width: 100%;
      min-height: 680px;
      background: #11151d;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    select, input, textarea, button {
      width: 100%;
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #11151d;
      color: var(--text);
      padding: 10px 12px;
    }
    textarea { min-height: 72px; resize: vertical; }
    button {
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
      font-weight: 500;
    }
    .log {
      display: grid;
      gap: 10px;
    }
    .log-entry {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: #11151d;
      font-size: 13px;
      line-height: 1.45;
    }
    .log-entry .meta {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .log-entry.active { border-color: var(--accent); }
    .log-entry.done { border-color: #2f6f52; }
    .log-entry.error { border-color: #7f3b3b; color: var(--danger); }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
      background: var(--node);
      border: 1px solid var(--border);
    }
    .legend .active::before { background: var(--node-active); border-color: var(--accent); }
    .legend .done::before { background: var(--node-done); border-color: var(--success); }
    @media (max-width: 960px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Zimbra Email Agent Demo</h1>
      <p>LangGraph architecture + live Zimbra inbox automation</p>
    </div>
    <div id="health-status" class="status-pill">Checking Zimbra...</div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">Agent architecture</div>
      <div class="panel-body">
        <svg id="graph-canvas" viewBox="0 0 800 680" role="img" aria-label="Email agent graph"></svg>
        <div class="legend">
          <span>Pending</span>
          <span class="active">Running</span>
          <span class="done">Completed</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">Live execution</div>
      <div class="panel-body">
        <div class="controls">
          <div>
            <label for="user-select">Mailbox</label>
            <select id="user-select">
              <option value="">Loading users...</option>
            </select>
          </div>
          <div>
            <label for="instruction">Focus (optional)</label>
            <textarea id="instruction" placeholder="e.g. prioritize invoices and customer escalations"></textarea>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button id="run-btn">Run agent</button>
            <button id="clear-btn" class="secondary" type="button">Clear log</button>
          </div>
        </div>
        <div id="event-log" class="log"></div>
      </div>
    </section>
  </main>

  <script src="demo.js"></script>
</body>
</html>
